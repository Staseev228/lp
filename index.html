<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D шаблоны PowerPoint • Полуночная версия</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌙 Полуночные шаблоны PowerPoint</h1>
            <p>Золото в темноте — 3D-превью и один клик до скачивания</p>
            <a href="index2.html" class="profile-link">👤 Личный кабинет</a>
        </header>

        <div class="grid" id="templates-grid"></div>

        <!-- Инструкция -->
        <div class="instruction">
            <i class="fas fa-cog"></i>
            <span><strong>Как добавить свои шаблоны?</strong> В массиве <code>templates</code> укажите для каждого: <code>name</code>, <code>desc</code>, <code>file</code>, <code>image</code> (можно пусто), <code>size</code>.</span>
        </div>
    </div>

    <footer>
        ⚡ 9 объёмных шаблонов • клик по картинке для предпросмотра
    </footer>

    <!-- Модальное окно -->
    <div id="modal" class="modal" onclick="closeModal(event)">
        <span class="modal-close" onclick="closeModal(event)">&times;</span>
        <div class="modal-content" id="modal-content">
            <img id="modal-image" src="" alt="Превью">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
