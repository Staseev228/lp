<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет • Полуночные шаблоны</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌙 Личный кабинет</h1>
            <a href="index.html" class="back-link">← На главную</a>
        </header>

        <div class="profile-card">
            <!-- Аватар с возможностью загрузки -->
            <div class="avatar" id="avatarPreview">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="avatar-upload">
                <label for="avatarInput" class="btn">Выбрать фото</label>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>

            <h2>Иван Иванов</h2>
            <p>Email: ivan@example.com</p>
            <p>Дата регистрации: 01.01.2025</p>
            <p>Всего скачиваний: 12</p>

            <div class="profile-actions">
                <button class="btn" onclick="logout()">Выйти</button>
            </div>
        </div>
    </div>

    <script src="script2.js"></script>
</body>
</html>
